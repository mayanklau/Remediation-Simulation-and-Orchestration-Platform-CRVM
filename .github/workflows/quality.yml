name: quality

on:
  push:
  pull_request:

jobs:
  api-and-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r backend/requirements.txt
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements.txt
      - run: python -m compileall backend/app
      - run: python -m pytest
      - run: python scripts/db_maintenance.py index-manifest
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: docker build -t remediation-twin-api:${{ github.sha }} backend
      - run: docker build -t remediation-twin-web:${{ github.sha }} frontend
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: remediation-twin-api:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: remediation-twin-web:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
