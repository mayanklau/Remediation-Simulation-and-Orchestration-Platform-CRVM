services:
  - type: web
    name: crvm-remediation-twin-api
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: remediation_twin_crvm
      - key: DEFAULT_TENANT_SLUG
        value: default
      - key: SESSION_SECRET
        generateValue: true
      - key: OIDC_ISSUER
        sync: false
      - key: OIDC_CLIENT_ID
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"

  - type: web
    name: crvm-remediation-twin-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

